spring.application.name=notification-service
server.port=8084

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserialization Config (Match the Inventory Service fix)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Explicit JSON configuration
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.oms.common.lib.events.PaymentSuccessEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.oms.common.lib.events

# Mail Configuration (Example)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=manpreetsinghms1080@gmail.com
spring.mail.password=${gmail_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

